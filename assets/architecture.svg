<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="520" fill="#08080f" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600" letter-spacing="-0.5">Jobsy — Architecture Overview</text>

  <!-- ── USER BROWSER ── -->
  <rect x="30" y="80" width="180" height="340" rx="12" fill="#0f0f1a" stroke="#2a2a45" stroke-width="1.5"/>
  <text x="120" y="106" text-anchor="middle" fill="#8080a6" font-size="10" font-weight="600" letter-spacing="1">BROWSER</text>
  <text x="120" y="124" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="500">User's Browser</text>

  <rect x="46" y="140" width="148" height="32" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="120" y="161" text-anchor="middle" fill="#e0e0f5" font-size="11">Vanilla JS / HTML</text>

  <rect x="46" y="180" width="148" height="32" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="120" y="201" text-anchor="middle" fill="#e0e0f5" font-size="11">Liquid Glass UI</text>

  <rect x="46" y="220" width="148" height="32" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="120" y="241" text-anchor="middle" fill="#e0e0f5" font-size="11">sessionStorage (key)</text>

  <rect x="46" y="260" width="68" height="28" rx="5" fill="#1a2a1a" stroke="#2d4a2d" stroke-width="1"/>
  <text x="80" y="279" text-anchor="middle" fill="#6fcf6f" font-size="10">Free tier</text>

  <rect x="126" y="260" width="68" height="28" rx="5" fill="#1a1a2e" stroke="#2d2d50" stroke-width="1"/>
  <text x="160" y="279" text-anchor="middle" fill="#8080e0" font-size="10">Pro tier</text>

  <rect x="46" y="300" width="148" height="52" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="120" y="320" text-anchor="middle" fill="#8080a6" font-size="9.5">5 tools: Optimizer,</text>
  <text x="120" y="335" text-anchor="middle" fill="#8080a6" font-size="9.5">Cover Letter, LinkedIn,</text>
  <text x="120" y="350" text-anchor="middle" fill="#8080a6" font-size="9.5">Job Match, Skill Gap</text>

  <!-- ── RENDER BACKEND ── -->
  <rect x="290" y="80" width="200" height="340" rx="12" fill="#0f0f1a" stroke="#2a2a45" stroke-width="1.5"/>
  <text x="390" y="106" text-anchor="middle" fill="#8080a6" font-size="10" font-weight="600" letter-spacing="1">RENDER FREE TIER</text>
  <text x="390" y="124" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="500">FastAPI Backend</text>

  <rect x="306" y="140" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="159" text-anchor="middle" fill="#e0e0f5" font-size="11">Rate limiting (IP-based)</text>

  <rect x="306" y="176" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="195" text-anchor="middle" fill="#e0e0f5" font-size="11">Input validation (Pydantic)</text>

  <rect x="306" y="212" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="231" text-anchor="middle" fill="#e0e0f5" font-size="11">Security headers (CSP etc.)</text>

  <rect x="306" y="248" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="267" text-anchor="middle" fill="#e0e0f5" font-size="11">Tier routing (Free / Pro)</text>

  <rect x="306" y="284" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="303" text-anchor="middle" fill="#e0e0f5" font-size="11">Adzuna jobs proxy</text>

  <rect x="306" y="320" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="339" text-anchor="middle" fill="#e0e0f5" font-size="11">Sentry error tracking</text>

  <rect x="306" y="356" width="168" height="28" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="390" y="375" text-anchor="middle" fill="#e0e0f5" font-size="11">Stateless — no database</text>

  <!-- ── AI PROVIDERS ── -->
  <rect x="570" y="80" width="170" height="130" rx="12" fill="#0f0f1a" stroke="#2a2a45" stroke-width="1.5"/>
  <text x="655" y="106" text-anchor="middle" fill="#8080a6" font-size="10" font-weight="600" letter-spacing="1">AI PROVIDERS</text>

  <rect x="586" y="118" width="138" height="38" rx="6" fill="#1a2a1a" stroke="#2d4a2d" stroke-width="1"/>
  <text x="655" y="134" text-anchor="middle" fill="#6fcf6f" font-size="10" font-weight="500">Google Gemini Flash</text>
  <text x="655" y="148" text-anchor="middle" fill="#4a7a4a" font-size="9">Free tier — server key</text>

  <rect x="586" y="164" width="138" height="38" rx="6" fill="#1a1a2e" stroke="#2d2d50" stroke-width="1"/>
  <text x="655" y="180" text-anchor="middle" fill="#8080e0" font-size="10" font-weight="500">Anthropic Claude</text>
  <text x="655" y="194" text-anchor="middle" fill="#4a4a8a" font-size="9">Pro — user's own key</text>

  <!-- ── JOB SEARCH ── -->
  <rect x="570" y="232" width="170" height="72" rx="12" fill="#0f0f1a" stroke="#2a2a45" stroke-width="1.5"/>
  <text x="655" y="254" text-anchor="middle" fill="#8080a6" font-size="10" font-weight="600" letter-spacing="1">JOB SEARCH</text>
  <rect x="586" y="264" width="138" height="32" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="655" y="280" text-anchor="middle" fill="#e0e0f5" font-size="11">Adzuna API</text>
  <text x="655" y="293" text-anchor="middle" fill="#8080a6" font-size="9">credentials server-side</text>

  <!-- ── CI/CD ── -->
  <rect x="570" y="326" width="170" height="94" rx="12" fill="#0f0f1a" stroke="#2a2a45" stroke-width="1.5"/>
  <text x="655" y="348" text-anchor="middle" fill="#8080a6" font-size="10" font-weight="600" letter-spacing="1">CI / CD</text>
  <rect x="586" y="358" width="138" height="26" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="655" y="375" text-anchor="middle" fill="#e0e0f5" font-size="11">GitHub Actions</text>
  <rect x="586" y="390" width="138" height="26" rx="6" fill="#14141f" stroke="#2a2a45" stroke-width="1"/>
  <text x="655" y="407" text-anchor="middle" fill="#e0e0f5" font-size="11">CodeRabbit AI review</text>

  <!-- ── ARROWS ── -->
  <!-- Browser → Backend (HTTPS POST /api/analyze) -->
  <line x1="210" y1="220" x2="288" y2="220" stroke="#3a3a60" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="249" y="212" text-anchor="middle" fill="#5a5a80" font-size="9">HTTPS</text>
  <text x="249" y="224" text-anchor="middle" fill="#5a5a80" font-size="9">/api/analyze</text>

  <!-- Backend → Gemini (Free) -->
  <line x1="490" y1="150" x2="568" y2="140" stroke="#2d4a2d" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrg)"/>
  <text x="527" y="140" text-anchor="middle" fill="#3a5a3a" font-size="8.5">Free</text>

  <!-- Backend → Claude (Pro) -->
  <line x1="490" y1="190" x2="568" y2="182" stroke="#2d2d50" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrp)"/>
  <text x="527" y="193" text-anchor="middle" fill="#3a3a6a" font-size="8.5">Pro (user key)</text>

  <!-- Backend → Adzuna -->
  <line x1="490" y1="295" x2="568" y2="280" stroke="#3a3a60" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- GitHub → Render (deploy) -->
  <line x1="655" y1="420" x2="490" y2="390" stroke="#3a3a60" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="580" y="415" text-anchor="middle" fill="#5a5a80" font-size="8.5">auto-deploy</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3a3a60"/>
    </marker>
    <marker id="arrg" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2d4a2d"/>
    </marker>
    <marker id="arrp" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2d2d50"/>
    </marker>
  </defs>

  <!-- ── NO DATABASE CALLOUT ── -->
  <rect x="290" y="440" width="200" height="28" rx="6" fill="#1a1209" stroke="#3a2a0a" stroke-width="1"/>
  <text x="390" y="459" text-anchor="middle" fill="#c8a030" font-size="10">No database — stateless API design</text>

  <!-- Legend -->
  <line x1="30" y1="478" x2="55" y2="478" stroke="#2d4a2d" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="62" y="482" fill="#4a7a4a" font-size="9">Free path</text>
  <line x1="130" y1="478" x2="155" y2="478" stroke="#2d2d50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="162" y="482" fill="#4a4a8a" font-size="9">Pro path</text>
  <line x1="220" y1="478" x2="245" y2="478" stroke="#3a3a60" stroke-width="1.5"/>
  <text x="252" y="482" fill="#5a5a80" font-size="9">Standard</text>
</svg>
